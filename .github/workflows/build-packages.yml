name: Build Packages

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag / version to build (e.g. v0.1.0). Leave empty to use HEAD.'
        required: false
        default: ''

env:
  GO_VERSION: '1.24'
  XCADDY_VERSION: 'latest'

jobs:

  # ── Compute version string ───────────────────────────────────────────────
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.v.outputs.version }}
      rpm_version: ${{ steps.v.outputs.rpm_version }}
      deb_version: ${{ steps.v.outputs.deb_version }}
      plugin_ref:  ${{ steps.v.outputs.plugin_ref }}
      date:        ${{ steps.v.outputs.date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            RAW="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RAW="${GITHUB_REF_NAME}"
          else
            LATEST=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo "v0.0.0")
            COMMITS=$(git rev-list ${LATEST}..HEAD --count)
            HASH=$(git rev-parse --short HEAD)
            RAW="${LATEST}.post${COMMITS}+g${HASH}"
          fi
          VER="${RAW#v}"
          RPM_VER=$(echo "$VER" | sed 's/-/~/g; s/+/~/g')
          DEB_VER=$(echo "$VER" | sed 's/+/~/g')
          # Always build from the local checkout so tag names on the fork
          # do not need to exist on the upstream module proxy.
          PLUGIN_REF="github.com/mholt/caddy-l4=${GITHUB_WORKSPACE}"
          DATE=$(date -u '+%a %b %d %Y')
          echo "version=${VER}"           >> "$GITHUB_OUTPUT"
          echo "rpm_version=${RPM_VER}"   >> "$GITHUB_OUTPUT"
          echo "deb_version=${DEB_VER}"   >> "$GITHUB_OUTPUT"
          echo "plugin_ref=${PLUGIN_REF}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}"             >> "$GITHUB_OUTPUT"
          echo "VER=${VER}  RPM=${RPM_VER}  DEB=${DEB_VER}  REF=${PLUGIN_REF}"

  # ── Build caddy for Linux (amd64) ────────────────────────────────────────
  build-linux:
    name: Build binary (linux/amd64)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@${{ env.XCADDY_VERSION }}

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          GOTOOLCHAIN: auto
          CGO_ENABLED: '0'
        run: |
          xcaddy build \
            --with ${{ needs.version.outputs.plugin_ref }} \
            --output caddy-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: caddy-linux-amd64
          path: caddy-linux-amd64
          retention-days: 1

  # ── Build caddy for FreeBSD (amd64) — cross-compiled on Linux ────────────
  build-freebsd:
    name: Build binary (freebsd/amd64)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install xcaddy
        run: go install github.com/caddyserver/xcaddy/cmd/xcaddy@${{ env.XCADDY_VERSION }}

      - name: Build
        env:
          GOOS: freebsd
          GOARCH: amd64
          GOTOOLCHAIN: auto
          CGO_ENABLED: '0'
        run: |
          xcaddy build \
            --with ${{ needs.version.outputs.plugin_ref }} \
            --output caddy-freebsd-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: caddy-freebsd-amd64
          path: caddy-freebsd-amd64
          retention-days: 1

  # ── Package: ALT Linux ───────────────────────────────────────────────────
  package-altlinux:
    name: RPM (${{ matrix.branch }})
    runs-on: ubuntu-latest
    needs: [version, build-linux]
    # NOTE: No public Docker image for ALT Linux p11/Sisyphus could be found.
    # RPMs are built on Fedora (fully compatible RPM toolchain).
    # For production ALT Linux packages rebuild with packaging/altlinux/caddy-l4.spec
    # on an actual ALT Linux p11 or Sisyphus system.
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: p11
            release: alt1.p11
          - branch: sisyphus
            release: alt1.sisyphus

    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: caddy-linux-amd64
          path: /tmp/bin

      - name: Install build tools
        run: dnf install -y rpm-build systemd-rpm-macros shadow-utils

      - name: Build RPM
        env:
          VERSION: ${{ needs.version.outputs.rpm_version }}
          RELEASE: ${{ matrix.release }}
          DATE:    ${{ needs.version.outputs.date }}
        run: |
          set -e
          chmod 0755 /tmp/bin/caddy-linux-amd64
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp /tmp/bin/caddy-linux-amd64           ~/rpmbuild/SOURCES/caddy
          cp packaging/systemd/caddy-l4.service   ~/rpmbuild/SOURCES/caddy-l4.service
          cp Caddyfile.example                     ~/rpmbuild/SOURCES/Caddyfile.example
          cp LICENSE                               ~/rpmbuild/SOURCES/LICENSE
          cp README.md                             ~/rpmbuild/SOURCES/README.md
          sed -e "s/%%VERSION%%/${VERSION}/g" \
              -e "s/%%RELEASE%%/${RELEASE}/g" \
              -e "s/%%DATE%%/${DATE}/g" \
              packaging/altlinux/caddy-l4.spec \
              > ~/rpmbuild/SPECS/caddy-l4.spec
          rpmbuild -bb ~/rpmbuild/SPECS/caddy-l4.spec

      - name: Collect RPMs
        run: |
          mkdir -p /tmp/artifacts
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} /tmp/artifacts/ \;
          ls -lh /tmp/artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-altlinux-${{ matrix.branch }}
          path: /tmp/artifacts/*.rpm
          retention-days: 1

  # ── Package: Debian ──────────────────────────────────────────────────────
  package-debian:
    name: DEB (Debian ${{ matrix.codename }})
    runs-on: ubuntu-latest
    needs: [version, build-linux]
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: bookworm
          - codename: trixie

    container:
      image: debian:${{ matrix.codename }}

    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: caddy-linux-amd64
          path: /tmp/bin

      - name: Install build tools
        run: apt-get update -qq && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends fakeroot dpkg-dev

      - name: Build DEB
        env:
          VERSION:  ${{ needs.version.outputs.deb_version }}
          CODENAME: ${{ matrix.codename }}
        run: |
          set -e
          chmod 0755 /tmp/bin/caddy-linux-amd64
          PKG="caddy-l4_${VERSION}-1~${CODENAME}1_amd64"
          STAGE="/tmp/deb/${PKG}"
          install -d "${STAGE}/DEBIAN"
          install -d "${STAGE}/usr/bin"
          install -d "${STAGE}/lib/systemd/system"
          install -d "${STAGE}/etc/caddy"
          install -d "${STAGE}/var/lib/caddy"
          install -d "${STAGE}/var/log/caddy"
          install -d "${STAGE}/usr/share/doc/caddy-l4"
          mkdir -p /tmp/debs
          install -m 0755 /tmp/bin/caddy-linux-amd64             "${STAGE}/usr/bin/caddy"
          install -m 0644 packaging/systemd/caddy-l4.service     "${STAGE}/lib/systemd/system/caddy-l4.service"
          install -m 0644 Caddyfile.example                      "${STAGE}/etc/caddy/Caddyfile.example"
          install -m 0644 LICENSE                                "${STAGE}/usr/share/doc/caddy-l4/copyright"
          install -m 0644 README.md                              "${STAGE}/usr/share/doc/caddy-l4/README.md"
          sed -e "s/@@VERSION@@/${VERSION}/g" \
              -e "s/@@CODENAME@@/${CODENAME}/g" \
              packaging/debian/control.template > "${STAGE}/DEBIAN/control"
          echo "/etc/caddy/Caddyfile.example" > "${STAGE}/DEBIAN/conffiles"
          install -m 0755 packaging/debian/postinst "${STAGE}/DEBIAN/postinst"
          install -m 0755 packaging/debian/prerm    "${STAGE}/DEBIAN/prerm"
          fakeroot dpkg-deb --build "${STAGE}" "/tmp/debs/${PKG}.deb"
          ls -lh /tmp/debs/

      - uses: actions/upload-artifact@v4
        with:
          name: deb-debian-${{ matrix.codename }}
          path: /tmp/debs/*.deb
          retention-days: 1

  # ── Package: FreeBSD ─────────────────────────────────────────────────────
  package-freebsd:
    name: PKG (FreeBSD ${{ matrix.fbsd_release }})
    runs-on: ubuntu-latest
    needs: [version, build-freebsd]
    strategy:
      fail-fast: false
      matrix:
        include:
          - fbsd_release: '14.2'
            fbsd_major: '14'
          - fbsd_release: '15.0'
            fbsd_major: '15'

    steps:
      - uses: actions/checkout@v4

      - name: Download FreeBSD binary
        uses: actions/download-artifact@v4
        with:
          name: caddy-freebsd-amd64
          path: ${{ github.workspace }}/artifacts

      - name: Package inside FreeBSD ${{ matrix.fbsd_release }}
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.fbsd_release }}
          usesh: true
          sync: rsync
          run: |
            set -e
            WS="${{ github.workspace }}"
            VERSION="${{ needs.version.outputs.version }}"
            FBSD_MAJOR="${{ matrix.fbsd_major }}"
            BINARY="${WS}/artifacts/caddy-freebsd-amd64"
            chmod 0755 "${BINARY}"
            file "${BINARY}"
            STAGE="/tmp/pkg-stage"
            install -d "${STAGE}/usr/local/bin"
            install -d "${STAGE}/usr/local/etc/caddy"
            install -d "${STAGE}/usr/local/etc/rc.d"
            install -d "${STAGE}/usr/local/share/doc/caddy-l4"
            install -m 0755 "${BINARY}"                                     "${STAGE}/usr/local/bin/caddy"
            install -m 0755 "${WS}/packaging/freebsd/rc.d/caddy_l4"        "${STAGE}/usr/local/etc/rc.d/caddy_l4"
            install -m 0644 "${WS}/Caddyfile.example"                       "${STAGE}/usr/local/etc/caddy/Caddyfile.example"
            install -m 0644 "${WS}/LICENSE"                                 "${STAGE}/usr/local/share/doc/caddy-l4/LICENSE"
            install -m 0644 "${WS}/README.md"                               "${STAGE}/usr/local/share/doc/caddy-l4/README.md"
            METADIR="/tmp/pkg-meta"
            mkdir -p "${METADIR}"
            sed -e "s/@@VERSION@@/${VERSION}/g" \
                -e "s/@@FBSD_MAJOR@@/${FBSD_MAJOR}/g" \
                "${WS}/packaging/freebsd/+MANIFEST.template" > "${METADIR}/+MANIFEST"
            # plist paths must be relative to the prefix (/usr/local), not rootdir.
            # pkg resolves files as rootdir + prefix + plist_path.
            (cd "${STAGE}" && find . -type f | sed 's|^\./usr/local/||' | sort) > "${METADIR}/plist"
            cat "${METADIR}/plist"
            mkdir -p "${WS}/pkgs"
            pkg create -m "${METADIR}" -r "${STAGE}" -p "${METADIR}/plist" -o "${WS}/pkgs"
            # Rename to include FreeBSD major version so FreeBSD 14 and 15 packages
            # have distinct filenames when both land in the same GitHub Release.
            for f in "${WS}/pkgs/"*.pkg; do
              mv "$f" "${WS}/pkgs/$(basename "$f" .pkg)-freebsd${FBSD_MAJOR}.pkg"
            done
            ls -lh "${WS}/pkgs/"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-freebsd-${{ matrix.fbsd_major }}
          path: ${{ github.workspace }}/pkgs/*.pkg
          retention-days: 1

  # ── Create GitHub Release ────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - version
      - package-altlinux
      - package-debian
      - package-freebsd
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{rpm-*,deb-*,pkg-*}'
          merge-multiple: false

      - name: List packages
        run: find artifacts -type f | sort

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            artifacts/**/*.rpm
            artifacts/**/*.deb
            artifacts/**/*.pkg
